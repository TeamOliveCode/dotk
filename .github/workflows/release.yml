name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile
          pnpm bundle

      - name: Package client assets
        run: tar czf dist/client.tar.gz -C dist client

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dotk
            dist/client.tar.gz
          generate_release_notes: true
